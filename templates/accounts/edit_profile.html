<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Profile Photo</label>
<input type="file" name="profile_picture"><br><br>

<label>Bio</label>
<textarea name="bio">{{ profile.bio }}</textarea><br><br>

<label>Career Goal</label>
<input type="text" name="career_goal" value="{{ profile.career_goal }}"><br><br>

<label>Education</label>
<input type="text" name="education" value="{{ profile.current_education }}"><br><br>

<label>University</label>
<input type="text" name="university" value="{{ profile.university }}"><br><br>

<label>LinkedIn</label>
<input type="url" name="linkedin" value="{{ profile.linkedin }}"><br><br>

<label>GitHub</label>
<input type="url" name="github" value="{{ profile.github }}"><br><br>

<label>Portfolio</label>
<input type="url" name="portfolio" value="{{ profile.portfolio }}"><br><br>

<label>Upload Resume</label>
<input type="file" name="resume"><br><br>

<button type="submit">Save Profile</button>

</form>
