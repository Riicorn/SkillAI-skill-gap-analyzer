<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillAI | Access .✦ ݁˖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        /* Lock screen to 100% height, no scroll */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        
        .split-view { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
        }

        /* Left Branding Panel */
        .brand-panel {
            flex: 1.2;
            background: var(--primary-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5rem;
            color: white;
            position: relative;
        }

        /* Right Form Panel */
        .form-panel {
            flex: 1;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            overflow-y: auto; /* Allows the form side to scroll if skills list gets long */
        }

        .content-limit { width: 100%; max-width: 420px; }

        .aesthetic-float {
            position: absolute;
            opacity: 0.4;
            font-size: 1.2rem;
            pointer-events: none;
        }

        @media (max-width: 992px) {
            .brand-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="split-view">
        <div class="brand-panel">
            <div class="aesthetic-float" style="top: 10%; left: 10%;">˚⟡˖ ࣪</div>
            <div class="aesthetic-float" style="bottom: 15%; right: 15%;">.✦ ݁˖</div>
            
            <div class="mb-4">
                <span style="font-size: 3.5rem;">Ი𐑼⋆</span>
            </div>
            <h1 class="display-4 fw-800 mb-3" style="letter-spacing: -1px;">SkillAI</h1>
            <p class="lead opacity-75 mb-5" style="max-width: 400px;">
                Visualize your career growth and bridge the gap .✦ ݁˖
            </p>
            
            <div class="p-4 rounded-4" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); max-width: 350px;">
                <p class="mb-0 small fw-600">Built for the future .ᐟ</p>
                <span class="x-small opacity-50">₍^. .^₎Ⳋ tracking active</span>
            </div>
        </div>

        <div class="form-panel">
            <div class="content-limit">
                {% block auth_content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
