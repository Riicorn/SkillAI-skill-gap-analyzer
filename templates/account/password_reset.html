{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | SkillAI</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fdf2f8;">

<div style="background:white;padding:40px;border-radius:20px;width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.08);">

    <h2 style="margin-bottom:10px;">Reset Password</h2>
    <p style="color:#64748b;margin-bottom:20px;">
        Enter your email and we’ll send you a reset link.
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter your email"
               style="width:100%;padding:14px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:15px;">

        <button type="submit"
            style="width:100%;padding:14px;border:none;border-radius:10px;
                   background:linear-gradient(135deg,#a78bfa,#f472b6);
                   color:white;font-weight:600;">
            Send Reset Link
        </button>
    </form>

</div>

</body>
</html>
