{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Email Sent | SkillAI</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fdf2f8;">

<div style="background:white;padding:40px;border-radius:20px;width:400px;text-align:center;
            box-shadow:0 20px 40px rgba(0,0,0,0.08);">

    <h2 style="margin-bottom:10px;">Check Your Email ✉</h2>

    <p style="color:#64748b;margin-bottom:20px;">
        We've sent you a password reset link.<br>
        Please check your inbox (or spam folder).
    </p>

    <a href="{% url 'account_login' %}"
       style="display:inline-block;padding:12px 20px;
              background:linear-gradient(135deg,#a78bfa,#f472b6);
              color:white;border-radius:10px;text-decoration:none;font-weight:600;">
        Back to Login
    </a>

</div>

</body>
</html>
