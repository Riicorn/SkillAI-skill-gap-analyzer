<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#fdf2f8; font-family:Arial;">

<div style="padding:40px 0; display:flex; justify-content:center;">
    
    <div style="
        background:white;
        padding:40px;
        border-radius:20px;
        width:420px;
        text-align:center;
        box-shadow:0 20px 40px rgba(0,0,0,0.08);
    ">

        <h2 style="color:#7c3aed; margin-bottom:10px;">
            Account Already Exists
        </h2>

        <p style="color:#334155; font-size:14px;">
            The email <b>{{ email }}</b> is already registered.
        </p>

        <p style="color:#64748b; font-size:13px;">
            If you forgot your password, you can reset it below.
        </p>

        <a href="{{ password_reset_url }}" style="
            display:inline-block;
            margin-top:20px;
            padding:12px 24px;
            background:linear-gradient(135deg,#a78bfa,#f472b6);
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:600;
        ">
            Reset Password
        </a>

        <p style="margin-top:20px; font-size:12px; color:#94a3b8;">
            If this wasn’t you, you can ignore this email.
        </p>

    </div>

</div>

</body>
</html>
