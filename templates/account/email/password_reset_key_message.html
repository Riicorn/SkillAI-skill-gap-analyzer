{% autoescape off %}

<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#fdf2f8; padding:20px;">

<div style="max-width:500px;margin:auto;background:white;padding:30px;border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08); text-align:center;">

    <h2 style="color:#7c3aed;">Reset Your Password ↪</h2>

    <p style="color:#64748b;">
        Hi {{ user.username }},
    </p>

    <p style="color:#64748b;">
        We received a request to reset your password.
        Click the button below to set a new password.
    </p>

    <a href="{{ password_reset_url }}"
       style="display:inline-block;margin:20px 0;padding:12px 24px;
              background:linear-gradient(135deg,#a78bfa,#f472b6);
              color:white;text-decoration:none;border-radius:8px;font-weight:bold;">
        Reset Password
    </a>

    <p style="color:#94a3b8;font-size:12px;">
        If you didn’t request this, you can safely ignore this email.
    </p>

</div>

</body>
</html>

{% endautoescape %}
